server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # PWA Service Worker는 캐싱 금지. 새 배포 즉시 반영.
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
        expires 0;
    }

    # SSE 엔드포인트 전용 프록시. 버퍼링 끄고 연결 길게 유지.
    # 정확한 경로는 백엔드 SSE 컨트롤러 매핑에 맞춰 조정 (예: /api/parking/stream)
    location /api/parking/stream {
        proxy_pass http://gateway-service.app.svc.cluster.local:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    # 프론트엔드 포드 안에서 백엔드로 가는 통로
    location /api {
        proxy_pass http://gateway-service.app.svc.cluster.local:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}